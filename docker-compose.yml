services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: pms_mosquitto_broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
    networks:
      - pms_network

  mongo:
    image: mongo:latest
    container_name: pms_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - pms_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pms_backend
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      - mongo
      - mosquitto
    networks:
      - pms_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pms_client
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - pms_network

  data-publisher:
    build:
      context: ./data-publisher
      dockerfile: Dockerfile
    container_name: pms_data_publisher
    env_file:
      - .env
    depends_on:
      - mosquitto
      - backend
    networks:
      - pms_network

networks:
  pms_network:
    driver: bridge

volumes:
  mongo_data:
  backend_node_modules:
